{% extends "layouts/admin_base.html" %}

{% block title %}Tambah Nasabah{% endblock %}
{% block page_title %}Tambah Nasabah{% endblock %}

{% block content %}

<div class="page-header">
    <div class="page-header-left">
        <h2>Tambah Nasabah</h2>
        <p>Isi formulir berikut untuk mendaftarkan nasabah baru ke dalam sistem.</p>
    </div>
    <a href="{{ url_for('admin_nasabah_index') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Kembali
    </a>
</div>

<div class="card form-card">
    <div class="card-header">
        <h3><i class="bi bi-person-plus"></i> Formulir Data Nasabah</h3>
    </div>
    <div class="card-body">
        <form action="#" method="POST">
            <div class="form-grid">

                <div class="form-group">
                    <label class="form-label" for="nama_nasabah">
                        Nama Lengkap <span class="required">*</span>
                    </label>
                    <input type="text" id="nama_nasabah" name="nama_nasabah"
                           class="form-control" placeholder="Masukkan nama lengkap nasabah">
                </div>

                <div class="form-group">
                    <label class="form-label" for="nik">
                        NIK <span class="required">*</span>
                    </label>
                    <input type="text" id="nik" name="nik"
                           class="form-control" placeholder="16 digit NIK" maxlength="16">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">
                        Alamat Email <span class="required">*</span>
                    </label>
                    <input type="email" id="email" name="email"
                           class="form-control" placeholder="contoh@email.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="no_hp">
                        Nomor HP <span class="required">*</span>
                    </label>
                    <input type="text" id="no_hp" name="no_hp"
                           class="form-control" placeholder="08xxxxxxxxxx">
                </div>

                <div class="form-group form-grid-full">
                    <label class="form-label" for="alamat">Alamat</label>
                    <textarea id="alamat" name="alamat" class="form-control"
                              placeholder="Masukkan alamat lengkap nasabah"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="tanggal_daftar">
                        Tanggal Daftar <span class="required">*</span>
                    </label>
                    <input type="date" id="tanggal_daftar" name="tanggal_daftar" class="form-control">
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> Simpan
                </button>
                <a href="{{ url_for('admin_nasabah_index') }}" class="btn btn-secondary">
                    <i class="bi bi-x"></i> Batal
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
