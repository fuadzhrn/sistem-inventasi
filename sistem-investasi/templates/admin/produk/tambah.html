{% extends "layouts/admin_base.html" %}

{% block title %}Tambah Produk Investasi{% endblock %}
{% block page_title %}Tambah Produk{% endblock %}

{% block content %}

<div class="page-header">
    <div class="page-header-left">
        <h2>Tambah Produk Investasi</h2>
        <p>Tambahkan produk investasi baru ke dalam sistem.</p>
    </div>
    <a href="{{ url_for('admin_produk_index') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Kembali
    </a>
</div>

<div class="card form-card">
    <div class="card-header">
        <h3><i class="bi bi-box-seam"></i> Formulir Data Produk</h3>
    </div>
    <div class="card-body">
        <form action="#" method="POST">
            <div class="form-grid">

                <div class="form-group">
                    <label class="form-label" for="nama_produk">
                        Nama Produk <span class="required">*</span>
                    </label>
                    <input type="text" id="nama_produk" name="nama_produk"
                           class="form-control" placeholder="Masukkan nama produk investasi">
                </div>

                <div class="form-group">
                    <label class="form-label" for="jenis_produk">
                        Jenis Produk <span class="required">*</span>
                    </label>
                    <select id="jenis_produk" name="jenis_produk" class="form-control">
                        <option value="" disabled selected>-- Pilih Jenis --</option>
                        <option value="Reksadana">Reksadana</option>
                        <option value="Obligasi">Obligasi</option>
                        <option value="Saham">Saham</option>
                        <option value="Deposito">Deposito</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="risiko">
                        Tingkat Risiko <span class="required">*</span>
                    </label>
                    <select id="risiko" name="risiko" class="form-control">
                        <option value="" disabled selected>-- Pilih Risiko --</option>
                        <option value="Rendah">Rendah</option>
                        <option value="Sedang">Sedang</option>
                        <option value="Tinggi">Tinggi</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="harga_unit_produk">
                        Harga per Unit (Rp) <span class="required">*</span>
                    </label>
                    <input type="number" id="harga_unit_produk" name="harga_unit_produk"
                           class="form-control" placeholder="Contoh: 100000" min="0">
                </div>

                <div class="form-group form-grid-full">
                    <label class="form-label" for="deskripsi">Deskripsi Produk</label>
                    <textarea id="deskripsi" name="deskripsi" class="form-control"
                              placeholder="Jelaskan produk investasi ini secara singkat..."></textarea>
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> Simpan
                </button>
                <a href="{{ url_for('admin_produk_index') }}" class="btn btn-secondary">
                    <i class="bi bi-x"></i> Batal
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
