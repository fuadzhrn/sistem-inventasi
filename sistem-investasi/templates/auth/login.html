<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Sistem Manajemen Investasi</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Auth CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">

            <!-- Brand -->
            <div class="login-brand">
                <div class="brand-icon">
                    <i class="bi bi-graph-up-arrow"></i>
                </div>
                <h1 class="login-title">Sistem Manajemen Investasi</h1>
                <p class="login-subtitle">Silakan login untuk melanjutkan</p>
            </div>

            <div class="login-divider"></div>

            <!-- Error Message -->
            {% if error %}
            <div class="alert-error" role="alert">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Form Login -->
            <form id="loginForm" method="POST" action="{{ url_for('login') }}" novalidate>

                <div class="form-group">
                    <label class="form-label" for="username">
                        <i class="bi bi-person"></i> Username
                    </label>
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-control"
                            placeholder="Masukkan username Anda"
                            value="{{ request.form.get('username', '') }}"
                            autocomplete="username"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="bi bi-lock"></i> Password
                    </label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            placeholder="Masukkan password Anda"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" id="btnTogglePass" class="btn-toggle-pass" title="Tampilkan / sembunyikan password">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="btnLogin" class="btn-login">
                    <div class="spinner"></div>
                    <span class="btn-text">
                        <i class="bi bi-box-arrow-in-right"></i> Masuk
                    </span>
                </button>

            </form>

        </div>

        <p class="login-footer">
            &copy; 2026 Sistem Manajemen Nasabah, Transaksi &amp; Portofolio Investasi
        </p>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
